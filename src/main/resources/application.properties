spring.application.name=backend

server.port=8082

# Base de données mysql
spring.datasource.url=jdbc:mysql://localhost:3306/claude
spring.datasource.username=claude
spring.datasource.password=claude

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=uneCleTresLongueDePlusde32CaracteresAbsolutementNecessaire
app.jwt.expiration=86400000

# Upload de fichiers
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Dossier de stockage des photos
app.upload.dir=uploads/photos