spring.application.name=backend

server.port=8082

# Base de données mysql
spring.datasource.url=jdbc:mysql://localhost:3306/claude
spring.datasource.username=claude
spring.datasource.password=claude

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=uneCleTresLongueDePlusde32CaracteresAbsolutementNecessaire
app.jwt.expiration=86400000

# Upload de fichiers
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Dossiers de stockage
app.upload.dir=uploads/photos
app.upload.services.dir=uploads/photos/services
app.upload.sous-services.dir=uploads/photos/sous-services
app.upload.commandes.dir=uploads/photos/commandes

# URL du frontend pour CORS
app.url.auto=http://localhost:5173
